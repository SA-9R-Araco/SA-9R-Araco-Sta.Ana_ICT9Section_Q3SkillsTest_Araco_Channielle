<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Falcon Express</title>
    <link rel="stylesheet" href="sty.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">Falcon Express</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="page2.html">Register</a></li>
       
    </ul>
</nav>


<div class="container">
    <h1>Welcome to Falcon Express</h1>
    <h3>Compute Your Fare</h3>

    <input type="text" id="pickup" placeholder="Pickup Location"><br>
    <input type="text" id="destination" placeholder="Destination"><br>
    <input type="number" id="distance" placeholder="Distance (km)"><br>
    <input type="text" id="promo" placeholder="Promo Code (Optional)"><br>

    <button onclick="computeFare()">Compute Fare</button>

    <h2 id="result"></h2>

    <br><br>

    <a href="page2.html">
        <button>Proceed to Registration</button>
    </a>
</div>

<script>
function computeFare() {

    let baseFare = 50;
    let baseKM = 2;
    let perKMrate = 10;

    let distance = parseFloat(document.getElementById("distance").value);
    let promo = document.getElementById("promo").value;

    if (isNaN(distance) || distance <= 0) {
        document.getElementById("result").innerHTML = "Please enter a valid distance.";
        return;
    }

    let totalFare;

    if (distance <= baseKM) {
        totalFare = baseFare;
    } else {
        totalFare = baseFare + (distance - baseKM) * perKMrate;
    }

    if (promo === "DISCOUNT10") {
        totalFare *= 0.90;
    }

    document.getElementById("result").innerHTML =
        "Total Fare: ₱" + totalFare.toFixed(2);
}
</script>

</body>
</html>
